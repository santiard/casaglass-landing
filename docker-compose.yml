version: "3.8"

services:
  landing:
    container_name: compose-landing-1
    build:
      context: ./landing
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

